services:
  postgres:
    image: postgres:16-alpine
    container_name: p2p-pg
    environment:
      POSTGRES_DB: ${DB_NAME}
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./sql/init/schema.sql:/docker-entrypoint-initdb.d/001_initial_schema.sql
    networks:
      - p2p-backend-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER} -d ${DB_NAME}"]
      interval: 5s
      timeout: 3s
      retries: 5
      start_period: 10s
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: p2p-redis
    environment:
      REDIS_PASSWORD: ${REDIS_PASSWORD}
    command:
      - redis-server
      - --requirepass
      - ${REDIS_PASSWORD}
    volumes:
      - redis_data:/data
    networks:
      - p2p-backend-net
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    restart: unless-stopped

  api:
    image: triddov/p2p-api:latest
    container_name: p2p-api
    extra_hosts:
      - "host.docker.internal:host-gateway"
    ports:
      - "127.0.0.1:${API_PORT}:${API_PORT}"
    environment:
      API_PORT: ${API_PORT}
      DB_HOST: ${DB_HOST}
      DB_PORT: ${DB_PORT}
      DB_USER: ${DB_USER}
      DB_PASSWORD: ${DB_PASSWORD}
      DB_NAME: ${DB_NAME}
      REDIS_ADDR: ${REDIS_ADDR}
      REDIS_PASSWORD: ${REDIS_PASSWORD}
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRATION_DAYS: ${JWT_EXPIRATION_DAYS}
      ENVIRONMENT: ${ENVIRONMENT:-development}
      SMTP_HOST: ${SMTP_HOST}
      SMTP_PORT: ${SMTP_PORT}
      SMTP_USERNAME: ${SMTP_USERNAME}
      SMTP_PASSWORD: ${SMTP_PASSWORD}
      SMTP_FROM: ${SMTP_FROM}
      SMTP_TLS_SERVER_NAME: ${SMTP_TLS_SERVER_NAME}
      ALLOWED_ORIGIN: ${ALLOWED_ORIGIN}
    networks:
      - p2p-backend-net
      - mail-net
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

  signaling:
    image: triddov/p2p-signaling:latest
    container_name: p2p-signaling
    ports:
      - "127.0.0.1:${SIGNALING_PORT}:${SIGNALING_PORT}"
    environment:
      DB_HOST: ${DB_HOST}
      DB_PORT: ${DB_PORT}
      DB_USER: ${DB_USER}
      DB_PASSWORD: ${DB_PASSWORD}
      DB_NAME: ${DB_NAME}
      JWT_SECRET: ${JWT_SECRET}
      ENVIRONMENT: ${ENVIRONMENT:-development}
      SIGNALING_PORT: ${SIGNALING_PORT}
      REDIS_ADDR: ${REDIS_ADDR}
      REDIS_PASSWORD: ${REDIS_PASSWORD}
    networks:
      - p2p-backend-net
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  coturn:
    image: coturn/coturn:latest
    container_name: p2p-coturn
    environment:
      TURN_REALM: ${TURN_REALM}
      TURN_USER: ${TURN_USER}
      TURN_PASSWORD: ${TURN_PASSWORD}
      TURN_EXTERNAL_IP: ${TURN_EXTERNAL_IP}
    network_mode: host
    volumes:
      - ./coturn/turnserver.conf:/etc/coturn/turnserver.conf:ro
    command: >
      -n
      --realm=${TURN_REALM}
      --external-ip=${TURN_EXTERNAL_IP}
      --user=${TURN_USER}:${TURN_PASSWORD}
    healthcheck:
      test: ["CMD-SHELL", "turnutils_stunclient -p 3478 127.0.0.1 >/dev/null 2>&1 || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 10s
    restart: unless-stopped

volumes:
  postgres_data:
    name: p2p_postgres_data
  redis_data:
    name: p2p_redis_data

networks:
  p2p-backend-net:
     name: p2p-backend-net
  mail-net:
    external: true

# coturn configuration for P2P Messenger
# This file is mounted read-only into the coturn container.
# The container uses network_mode: host, so all ports bind directly on the host.

# Listening port for TURN/STUN (UDP + TCP)
listening-port=3478

# External IP of this server — must match the host's public IP
# Set TURN_EXTERNAL_IP in .env.prod; docker-compose passes it via --external-ip arg.
# external-ip=<ip>

# Realm shown in TURN auth challenges
# realm=<domain>

# Long-term credential mechanism (used by WebRTC clients)
lt-cred-mech
fingerprint

# Logging — stdout only (Docker captures it via docker logs)
simple-log

# Disable CLI (not needed in Docker)
cli-port=0

# Disable DTLS/TLS for initial setup — enable when certs are available
# no-tls
# no-dtls

# Restrict relay to UDP only (reduces attack surface)
no-tcp-relay

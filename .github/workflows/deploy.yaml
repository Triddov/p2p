name: Deploy

on:
  push:
    branches: [main]

jobs:
  # test:
  #     runs-on: ubuntu-latest
  #     steps:
  #       - uses: actions/checkout@v4
  #       - uses: actions/setup-go@v5
  #         with:
  #           go-version: '1.22'
  #       - run: go test ./...

  deploy:
    # needs: test
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build & Push p2p-api
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile.api
          platforms: linux/amd64
          push: true
          tags: |
            triddov/p2p-api:latest
            triddov/p2p-api:${{ github.sha }}
          cache-from: type=gha,scope=p2p-api
          cache-to: type=gha,mode=max,scope=p2p-api

      - name: Build & Push p2p-signaling
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile.signaling
          platforms: linux/amd64
          push: true
          tags: |
            triddov/p2p-signaling:latest
            triddov/p2p-signaling:${{ github.sha }}
          cache-from: type=gha,scope=p2p-signaling
          cache-to: type=gha,mode=max,scope=p2p-signaling

      - name: Copy docker-compose to server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          source: "docker-compose.yaml"
          target: "/home/triddov/apps/p2p-backend"

      - name: Deploy to server
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            $HOME/apps/p2p-backend/start_script.sh

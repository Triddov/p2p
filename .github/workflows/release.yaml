name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build-apk:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      # NDK нужен, чтобы AGP стрипал debug-символы из нативных .so при упаковке
      - name: Install NDK
        run: $ANDROID_SDK_ROOT/cmdline-tools/latest/bin/sdkmanager "ndk;26.1.10909125"

      - name: Decode google-services.json
        run: echo "${{ secrets.GOOGLE_SERVICES_JSON_B64 }}" | base64 --decode > p2p-client/app/google-services.json

      - name: Build Release APK
        working-directory: p2p-client/
        run: ./gradlew assembleRelease

      - name: Setup Android Build Tools
        run: |
          $ANDROID_SDK_ROOT/cmdline-tools/latest/bin/sdkmanager "build-tools;34.0.0"

      - name: Sign APK
        uses: r0adkll/sign-android-release@v1
        id: sign_apk
        env:
          BUILD_TOOLS_VERSION: "34.0.0"
        with:
          releaseDirectory: p2p-client/app/build/outputs/apk/release
          signingKeyBase64: ${{ secrets.SIGNING_KEY }}
          alias: ${{ secrets.KEY_ALIAS }}
          keyStorePassword: ${{ secrets.KEY_STORE_PASSWORD }}
          keyPassword: ${{ secrets.KEY_PASSWORD }}

      - name: Rename APK
        run: mv "${{ steps.sign_apk.outputs.signedReleaseFile }}" p2p-${{ github.ref_name }}.apk

      - name: Publish Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v1
        with:
          files: p2p-${{ github.ref_name }}.apk
          body: "Release ${{ github.ref_name }}"
